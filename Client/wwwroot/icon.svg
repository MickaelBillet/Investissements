<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B6FBF"/>
      <stop offset="100%" stop-color="#3A9E8F"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Symbole € centré -->
  <text x="248" y="318"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="310"
        font-weight="900"
        text-anchor="middle"
        fill="white"
        opacity="0.97">€</text>

  <!-- Sparkline ascendante -->
  <polyline
    points="72,420  150,370  235,390  320,320  410,255  472,210"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"/>

  <!-- Flèche (pointe) -->
  <polyline
    points="435,198  472,210  460,248"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"/>
</svg>
